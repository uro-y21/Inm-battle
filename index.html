<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ガチャPvP</title>
    <link rel="stylesheet" href="style.css">   <!-- ← ここを修正 -->
</head>

<body>

    <h1>ガチャPvP</h1>

    <input id="name" placeholder="名前を入力">
    <button onclick="start()">開始</button>

    <div id="game" style="display:none;">
        <p id="coin"></p>
        <button onclick="gacha()">ガチャ</button>
        <button onclick="battle()">PvPバトル</button>

        <h3>所持キャラ</h3>
        <div id="chars"></div>

        <h3>デッキ（3体）</h3>
        <div id="deck"></div>

        <div id="log"></div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
